<svg width="220" height="40" viewBox="0 0 220 40" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Foundry Apps wordmark">
  <defs>
    <linearGradient id="fa-wm-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fdba74"/>
    </linearGradient>
  </defs>
  <!-- "Foundry" in forge orange -->
