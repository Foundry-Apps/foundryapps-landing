<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Foundry Apps icon">
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#1c1917"/>

  <!-- Anvil base -->
  <rect x="12" y="44" width="40" height="9" rx="3.5" fill="#44403c"/>

  <!-- Anvil horn (left taper) -->
  <path d="M12 44 L22 44 L17 36 Z" fill="#57534e"/>

  <!-- Anvil body -->
  <rect x="18" y="26" width="28" height="18" rx="4" fill="#78716c"/>

  <!-- Anvil top face (lighter, flat working surface) -->
  <rect x="14" y="22" width="36" height="6" rx="3" fill="#a8a29e"/>

  <!-- Ember glow on working surface -->
  <ellipse cx="32" cy="25" rx="12" ry="3.5" fill="url(#fa-icon-ember)"/>

  <!-- Sparks -->
  <circle cx="46" cy="17" r="2.5" fill="#fb923c" opacity="0.9"/>
  <circle cx="40" cy="11" r="1.8" fill="#fdba74" opacity="0.8"/>
  <circle cx="50" cy="26" r="1.5" fill="#f97316" opacity="0.85"/>
  <circle cx="43" cy="9"  r="1.2" fill="#fbbf24" opacity="0.65"/>

  <defs>
    <radialGradient id="fa-icon-ember" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#f97316" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#c2410c" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
